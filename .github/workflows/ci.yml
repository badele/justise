name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Install tools
        run: mise install

      - name: Run tests
        run: mise run test -- --locked

      - name: Build
        run: mise run build -- --locked

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: justise
          path: target/release/justise
