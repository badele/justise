[tools]
rust = "latest"
just = "latest"

[tasks.justise]
description = "Convert mise to just recipe"

hide = true
silent = true

run = '''
 cargo run --quiet
'''

[tasks.build]
description = "Build rust binary [Rust]"

run = '''
 cargo build --release
'''

[tasks.test]
description = "Run tests [Rust]"

run = '''
 cargo test
'''

[tasks.publish]
description = "Publish crate to crates.io [Rust]"

run = '''
 cargo publish --locked
'''


[tasks.precommit-install]
description = "Install pre-commit hooks [precommit]"

run = '''
pre-commit install
pre-commit install --hook-type commit-msg
'''


[tasks.check-install]
description = "Check all pre-commit tests [precommit]"

run = '''
  pre-commit run --all-files
'''

[tasks.deploy]
description = "Deploy a sample application to environment"
usage = '''
arg "<environment>" help="Target environment"
flag "-v --verbose" help="Enable verbose output"
flag "--region <region>" help="AWS region" default="us-east-1"
'''
run = '''
echo "Deploying to {{ usage.environment }} in {{ usage.region }}"
{% if usage.verbose %}
  echo "Verbose mode enabled"
{% endif %}
'''
